name = "roller-rabbit"
main = "cloudflare/workers/router.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false
preview_urls = false

[[routes]]
pattern = "mamamiya.pdfreprinting.net"
custom_domain = true

[assets]
binding = "ASSETS"
directory = "dist/client"

[images]
binding = "IMAGES"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "roller-rabbit-opennext-cache"

[[r2_buckets]]
binding = "APP_STORAGE_R2_BUCKET"
bucket_name = "roller-rabbit-storage"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "roller-rabbit"

[[services]]
binding = "PUBLIC_WEB_WORKER"
service = "roller-rabbit-public-web"

[[services]]
binding = "AUTH_WORKER"
service = "roller-rabbit-auth"

[[services]]
binding = "PAYMENT_WORKER"
service = "roller-rabbit-payment"

[[services]]
binding = "MEMBER_WORKER"
service = "roller-rabbit-member"

[[services]]
binding = "CHAT_WORKER"
service = "roller-rabbit-chat"

[[services]]
binding = "ADMIN_WORKER"
service = "roller-rabbit-admin"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "d208cd72765b46a7b0849fc687e2fb61"
localConnectionString = ""

[[durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"
script_name = "roller-rabbit-state"

[[durable_objects.bindings]]
name = "NEXT_TAG_CACHE_DO_SHARDED"
class_name = "DOShardedTagCache"
script_name = "roller-rabbit-state"

[[durable_objects.bindings]]
name = "STATEFUL_LIMITERS"
class_name = "StatefulLimitersDurableObject"
script_name = "roller-rabbit-state"

[observability]
enabled = true

[vars]
DEPLOY_TARGET = "cloudflare"
NEXT_PUBLIC_APP_URL = "https://mamamiya.pdfreprinting.net/"
NEXT_PUBLIC_THEME = "default"
STORAGE_PUBLIC_BASE_URL = ""
DATABASE_PROVIDER = "postgresql"
DB_SINGLETON_ENABLED = "true"
PUBLIC_WEB_WORKER_VERSION_ID = ""
AUTH_WORKER_VERSION_ID = ""
PAYMENT_WORKER_VERSION_ID = ""
MEMBER_WORKER_VERSION_ID = ""
CHAT_WORKER_VERSION_ID = ""
ADMIN_WORKER_VERSION_ID = ""
PUBLIC_WEB_WORKER_NAME = ""
AUTH_WORKER_NAME = ""
PAYMENT_WORKER_NAME = ""
MEMBER_WORKER_NAME = ""
CHAT_WORKER_NAME = ""
ADMIN_WORKER_NAME = ""
