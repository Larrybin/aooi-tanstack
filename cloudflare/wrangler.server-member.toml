name = "roller-rabbit-member"
main = "workers/server-member.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false
preview_urls = false

[assets]
binding = "ASSETS"
directory = "../.open-next/assets"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "roller-rabbit-opennext-cache"

[[r2_buckets]]
binding = "APP_STORAGE_R2_BUCKET"
bucket_name = "roller-rabbit-storage"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "d208cd72765b46a7b0849fc687e2fb61"
localConnectionString = ""

[[durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"
script_name = "roller-rabbit-state"

[[durable_objects.bindings]]
name = "NEXT_TAG_CACHE_DO_SHARDED"
class_name = "DOShardedTagCache"
script_name = "roller-rabbit-state"

[[durable_objects.bindings]]
name = "STATEFUL_LIMITERS"
class_name = "StatefulLimitersDurableObject"
script_name = "roller-rabbit-state"

[observability]
enabled = true

[vars]
DEPLOY_TARGET = "cloudflare"
NEXT_PUBLIC_APP_URL = "https://mamamiya.pdfreprinting.net/"
NEXT_PUBLIC_THEME = "default"
STORAGE_PUBLIC_BASE_URL = ""
DATABASE_PROVIDER = "postgresql"
DB_SINGLETON_ENABLED = "true"
